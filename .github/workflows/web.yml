name: Web checks

on:
  push:
    paths:
      - "apps/web/**"
      - "package.json"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - "package.json"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build
